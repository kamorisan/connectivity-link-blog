apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: news-api
  namespace: ${KUADRANT_DEVELOPER_NS}
  labels:
    app: news-api
spec:
  parentRefs:
  - name: ${KUADRANT_GATEWAY_NAME}
    namespace: api-gateway
  hostnames:
  - api.${KUADRANT_ZONE_ROOT_DOMAIN}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
      method: GET
    backendRefs:
    - name: news-api
      port: 80