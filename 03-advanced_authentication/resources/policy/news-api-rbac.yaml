apiVersion: kuadrant.io/v1
kind: AuthPolicy
metadata:
  name: news-api-rbac
  namespace: ${KUADRANT_DEVELOPER_NS}
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: news-api
  rules:
    authentication:
      keycloak-oidc:
        jwt:
          issuerUrl: ${KEYCLOAK_URL}/realms/${KEYCLOAK_REALM}
        credentials:
          authorizationHeader:
            prefix: Bearer
    authorization:
      check-user-role:
        opa:
          rego: |
            allow {
              input.auth.identity.realm_access.roles[_] == "user"
            }
            allow {
              input.auth.identity.realm_access.roles[_] == "premium"
            }
            allow {
              input.auth.identity.realm_access.roles[_] == "admin"
            }
    response:
      unauthenticated:
        headers:
          "content-type":
            value: application/json
        body:
          value: |
            {
              "error": "Unauthenticated",
              "message": "Valid JWT token is required"
            }
      unauthorized:
        headers:
          "content-type":
            value: application/json
        body:
          value: |
            {
              "error": "Unauthorized",
              "message": "User does not have required role (user, premium, or admin)"
            }
      success:
        filters:
          identity:
            json:
              properties:
                userid:
                  selector: auth.identity.sub
                username:
                  selector: auth.identity.preferred_username
                roles:
                  selector: auth.identity.realm_access.roles